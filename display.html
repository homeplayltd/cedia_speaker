<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEDIA — Speaker Queue</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #02050B;
      --accent: #C15027;
      --text: #FFFFFF;
      --text-dim: rgba(255,255,255,0.5);
      --text-faint: rgba(255,255,255,0.18);
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.07);
      --success: #22c55e;
      --danger: #ef4444;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }
    body { overflow: hidden; position: fixed; width: 100%; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(193,80,39,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 90%, rgba(193,80,39,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .screen {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      padding: 2.5vw 3vw 64px;
      gap: 2vh;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 2vh;
      border-bottom: 1px solid var(--card-border);
    }

    .logo img {
      height: 5vh; min-height: 42px; max-height: 68px;
      opacity: 0.9;
    }

    .meeting-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.9rem, 1.6vw, 1.4rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.65rem, 1vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* MAIN */
    .main {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 2vw;
      align-items: start;
    }

    /* SPEAKER CARD */
    .speaker-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 1.2vw;
      padding: 3vh 2.5vw;
      display: flex;
      flex-direction: column;
      gap: 2.5vh;
      position: relative;
      overflow: hidden;
    }

    .speaker-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }

    .speaker-card.empty::before { background: var(--text-faint); }

    .now-speaking-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.65rem, 1vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .speaker-card.empty .now-speaking-label { color: var(--text-dim); }

    .speaker-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 4.5vw, 5rem);
      font-weight: 700;
      line-height: 0.95;
    }

    .speaker-subject {
      font-size: clamp(0.85rem, 1.4vw, 1.3rem);
      color: var(--text-dim);
      line-height: 1.4;
    }

    .waiting-message {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.5rem, 3vw, 3.5rem);
      font-weight: 300;
      color: var(--text-faint);
    }

    /* TIMER */
    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.3vh;
    }

    .timer-display {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(4rem, 8vw, 9rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      transition: color 0.3s;
    }

    .timer-display.normal  { color: #FFFFFF; }
    .timer-display.warning { color: #f97316; }
    .timer-display.overtime {
      color: var(--danger);
      animation: pulse-red 1s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .timer-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.6rem, 0.9vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .timer-label.normal, .timer-label.warning { color: var(--text-dim); }
    .timer-label.overtime { color: var(--danger); }

    /* QUEUE PANEL */
    .queue-panel { display: flex; flex-direction: column; gap: 1.5vh; }

    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .queue-count {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.7rem, 1vw, 0.9rem);
      color: var(--text-dim);
    }

    .queue-list { display: flex; flex-direction: column; gap: 1vh; }

    .queue-item {
      display: grid;
      grid-template-columns: 2.5em 1fr;
      gap: 1vw;
      align-items: center;
      padding: 1.4vh 1.2vw;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 0.6vw;
      animation: slide-in 0.3s ease-out;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .queue-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.2rem, 1.8vw, 2rem);
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }

    .queue-item-info { display: flex; flex-direction: column; gap: 0.2vh; min-width: 0; }

    .queue-item-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1rem, 1.8vw, 2rem);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-item-subject {
      font-size: clamp(0.7rem, 1vw, 0.9rem);
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-queue {
      padding: 3vh 0;
      text-align: center;
      color: var(--text-faint);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.9rem, 1.4vw, 1.3rem);
      font-weight: 300;
      letter-spacing: 0.08em;
    }

    /* TOPIC BAR */
    .topic-bar { display: none; }

    .topic-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.2rem, 2.5vw, 2.8rem);
      font-weight: 600;
      line-height: 1.1;
    }

    .topic-text.no-topic { color: var(--text-faint); font-weight: 300; }

    .conn-dot {
      position: fixed;
      bottom: 58px; right: 24px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      transition: background 0.3s;
    }

    .conn-dot.disconnected { background: var(--danger); }

    /* =============================================
       KITTEN SCENE
       ============================================= */

    #kittenScene {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      display: flex;
      align-items: flex-end;
      gap: 0;
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 50;
      pointer-events: none;
    }

    #kittenScene.visible {
      transform: translateX(-50%) translateY(0%);
    }

    /* The kitten SVG wrapper */
    #kittenWrap {
      position: relative;
      width: clamp(90px, 12vw, 160px);
      flex-shrink: 0;
    }

    /* The gun SVG wrapper - slides in from right */
    #gunWrap {
      position: absolute;
      left: calc(clamp(90px, 12vw, 160px) * 1.05);
      bottom: calc(clamp(90px, 12vw, 160px) * 0.72);
      width: clamp(70px, 10vw, 130px);
      transform: translateX(300px);
      transition: transform 0.15s ease-out;
    }

    /* Stars burst on BANG */
    #bangEl {
      position: fixed;
      left: 50%;
      bottom: clamp(90px, 13vw, 170px);
      transform: translateX(-50%);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.5rem, 5vw, 6rem);
      font-weight: 800;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255,215,0,0.8), 2px 2px 0 #C15027;
      opacity: 0;
      pointer-events: none;
      z-index: 60;
      letter-spacing: 0.05em;
    }

    #bangEl.bang {
      animation: bang-flash 0.5s ease-out forwards;
    }

    #bangEl.overtime {
      opacity: 0.5;
      animation: none;
      font-size: clamp(1.2rem, 2vw, 2.5rem);
      color: rgba(255,215,0,0.5);
      text-shadow: none;
    }

    @keyframes bang-flash {
      0%   { opacity: 1; transform: translateX(-50%) scale(0.5) rotate(-5deg); }
      30%  { opacity: 1; transform: translateX(-50%) scale(1.2) rotate(3deg); }
      60%  { opacity: 1; transform: translateX(-50%) scale(1) rotate(-1deg); }
      100% { opacity: 0.4; transform: translateX(-50%) scale(0.9) rotate(0deg); }
    }

    /* Shake the scene on fire */
    @keyframes scene-shake {
      0%   { transform: translateX(-50%) translateY(0) rotate(0deg); }
      15%  { transform: translateX(calc(-50% - 8px)) translateY(-4px) rotate(-2deg); }
      30%  { transform: translateX(calc(-50% + 8px)) translateY(2px) rotate(2deg); }
      45%  { transform: translateX(calc(-50% - 5px)) translateY(-2px) rotate(-1deg); }
      60%  { transform: translateX(calc(-50% + 4px)) translateY(1px) rotate(1deg); }
      75%  { transform: translateX(calc(-50% - 2px)) translateY(0) rotate(0deg); }
      100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
    }

    #kittenScene.fired {
      animation: scene-shake 0.4s ease-out;
    }

    /* Smoke puffs from gun barrel */
    .smoke {
      position: absolute;
      top: 20%;
      left: -8px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: smoke-rise 1.2s ease-out infinite;
      pointer-events: none;
    }

    .smoke:nth-child(2) { animation-delay: 0.3s; width: 8px; height: 8px; left: -5px; }
    .smoke:nth-child(3) { animation-delay: 0.6s; width: 6px; height: 6px; left: -10px; }

    @keyframes smoke-rise {
      0%   { opacity: 0.8; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-30px) scale(2.5); }
    }

    /* Growlcom label */
    #stuartLabel {
      display: none;
      position: fixed;
      bottom: clamp(130px, 18vw, 220px);
      left: 50%;
      transform: translateX(-140px);
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 55;
    }

    #stuartLabel.visible {
      display: flex;
      animation: stuart-bounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes stuart-bounce {
      0%   { opacity: 0; transform: translateX(-140px) scale(0.5); }
      70%  { transform: translateX(-140px) scale(1.1); opacity: 1; }
      100% { transform: translateX(-140px) scale(1);  opacity: 1; }
    }

    .stuart-text {
      background: #FFD700;
      color: #02050B;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1rem, 2vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 6px 16px;
      border-radius: 8px;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      animation: stuart-pulse 1.2s ease-in-out infinite;
    }

    @keyframes stuart-pulse {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50%       { transform: scale(1.04) rotate(1deg); }
    }

    .stuart-arrow {
      font-size: clamp(1.5rem, 3vw, 3rem);
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      animation: arrow-bounce 0.7s ease-in-out infinite;
    }

    @keyframes arrow-bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    @keyframes gun-hover {
      0%   { transform: translateX(0px) rotate(0deg); }
      25%  { transform: translateX(3px) rotate(1deg); }
      50%  { transform: translateX(0px) rotate(-1deg); }
      75%  { transform: translateX(-3px) rotate(0.5deg); }
      100% { transform: translateX(0px) rotate(0deg); }
    }

    /* Home button */
    .home-btn {
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.55);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .home-btn:hover {
      background: rgba(193,80,39,0.15);
      border-color: rgba(193,80,39,0.35);
      color: #FFFFFF;
    }
    .home-btn svg {
      width: 13px; height: 13px;
      flex-shrink: 0;
    }

    /* Live connection indicator */
    .live-indicator {
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(2,5,11,0.7);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 20px;
      backdrop-filter: blur(6px);
      pointer-events: none;
      transition: border-color 0.4s, background 0.4s;
    }

    .live-indicator.disconnected {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.4);
    }

    .live-indicator-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
      animation: live-pulse 1.5s ease-in-out infinite;
      transition: background 0.4s;
    }

    .live-indicator.disconnected .live-indicator-dot {
      background: var(--danger);
      animation: none;
    }

    @keyframes live-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.8); transform: scale(1); }
      50%  { box-shadow: 0 0 0 7px rgba(34,197,94,0); transform: scale(1.2); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); transform: scale(1); }
    }

    .live-indicator-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--success);
      transition: color 0.4s;
    }

    .live-indicator.disconnected .live-indicator-text {
      color: var(--danger);
    }

    /* ---- BOTTOM BAR ---- */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      height: calc(56px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 3vw;
      background: rgba(2,5,11,0.92);
      border-top: 1px solid var(--card-border);
      backdrop-filter: blur(8px);
      z-index: 150;
    }

    .bottom-topic {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .bottom-topic-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .bottom-topic-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.1rem, 2vw, 2.2rem);
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
    }

    .bottom-topic-text.no-topic {
      color: var(--text-faint);
      font-weight: 300;
    }

    /* QR code join prompt */
    .qr-join {
      position: fixed;
      bottom: calc(56px + env(safe-area-inset-bottom, 0px) + 1.5vw);
      left: 3vw;
      display: flex;
      align-items: center;
      gap: 1vw;
      z-index: 140;
    }

    .qr-join-code {
      background: #fff;
      border-radius: 0.6vw;
      padding: 0.5vw;
      line-height: 0;
    }

    .qr-join-code canvas, .qr-join-code img {
      display: block;
      width: clamp(56px, 5.5vw, 80px) !important;
      height: clamp(56px, 5.5vw, 80px) !important;
    }

    .qr-join-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .qr-join-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.6rem, 0.9vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .qr-join-url {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.55rem, 0.8vw, 0.75rem);
      color: var(--text-dim);
    }

    /* Queue closed indicator */
    .queue-closed-banner {
      display: none;
      position: fixed;
      bottom: calc(56px + env(safe-area-inset-bottom, 0px) + 1.5vw);
      left: 3vw;
      align-items: center;
      gap: 0.8vw;
      z-index: 140;
      padding: 0.6vw 1.2vw;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 0.6vw;
    }

    .queue-closed-banner.visible { display: flex; }

    .queue-closed-icon {
      font-size: clamp(1rem, 1.5vw, 1.4rem);
      line-height: 1;
    }

    .queue-closed-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.7rem, 1.1vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--danger);
    }
  </style>
</head>
<body>
<div class="screen">

  <!-- HEADER -->
  <div class="header">
    <a href="/" style="text-decoration:none;"><div class="logo">
      <img src="https://cedia.org/site/assets/files/1033/cedia_logo_tagline_white_email-1.png" alt="CEDIA">
    </div></a>
    
    <div class="meeting-label">Board Meeting</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Speaker + Timer -->
    <div class="speaker-card empty" id="speakerCard">
      <div class="now-speaking-label" id="speakingLabel">NOW SPEAKING</div>

      <div id="speakerInfo">
        <div class="waiting-message" id="waitingMsg">Waiting for first speaker</div>
        <div class="speaker-name" id="speakerName" style="display:none"></div>
        <div class="speaker-subject" id="speakerSubject" style="display:none"></div>
      </div>

      <div class="timer-block" id="timerBlock" style="display:none">
        <div class="timer-display normal" id="timerDisplay">2:00</div>
        <div class="timer-label normal" id="timerLabel">REMAINING</div>
      </div>
    </div>

    <!-- Queue -->
    <div class="queue-panel">
      <div class="queue-header">
        <div class="section-label">Next Up</div>
        <div class="queue-count" id="queueCount"></div>
      </div>
      <div class="queue-list" id="queueList">
        <div class="empty-queue">No speakers in queue</div>
      </div>
    </div>

  </div>

</div><!-- end .screen -->

<!-- QR code join prompt (hidden when queue closed) -->
<div class="qr-join" id="qrJoin">
  <div class="qr-join-code" id="displayQr"></div>
  <div class="qr-join-text">
    <div class="qr-join-label">Scan to Join</div>
    <div class="qr-join-url">speaker-queue.homeplay.tv/join</div>
  </div>
</div>

<!-- Queue closed banner (shown when queue closed) -->
<div class="queue-closed-banner" id="queueClosedBanner">
  <span class="queue-closed-icon">🔒</span>
  <span class="queue-closed-text">Queue Closed</span>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="bottom-topic">
    <div class="bottom-topic-label">Current Topic</div>
    <div class="bottom-topic-text no-topic" id="topicText">No topic set</div>
  </div>
  <div class="live-indicator" id="liveIndicator">
    <div class="live-indicator-dot"></div>
    <span class="live-indicator-text" id="liveIndicatorText">Live Connection</span>
  </div>
  <a class="home-btn" href="/" style="justify-self:end;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
    Home
  </a>

<!-- BANG text -->
<div id="bangEl">BANG!</div>

<!-- Growlcom label (only shown when Stuart is overtime) -->
<div id="stuartLabel">
  <div class="stuart-text">&#x1F449; Growlcom</div>
  <div class="stuart-arrow">&#x2B07;&#xFE0F;</div>
</div>

<!-- KITTEN SCENE -->
<div id="kittenScene">

  <!-- The kitten -->
  <div id="kittenWrap">
    <svg id="kittenSvg" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">

      <!-- Body -->
      <ellipse cx="60" cy="118" rx="28" ry="20" fill="#F4A460"/>
      <!-- Tummy -->
      <ellipse cx="60" cy="120" rx="16" ry="13" fill="#FDE8C8"/>

      <!-- Head -->
      <circle cx="60" cy="72" r="35" fill="#F4A460"/>

      <!-- Ears -->
      <polygon points="28,48 18,20 45,42" fill="#F4A460"/>
      <polygon points="92,48 102,20 75,42" fill="#F4A460"/>
      <!-- Inner ears -->
      <polygon points="30,46 22,26 43,43" fill="#FFB6C1"/>
      <polygon points="90,46 98,26 77,43" fill="#FFB6C1"/>

      <!-- Face: normal state -->
      <g id="faceNormal">
        <!-- Eyes: big cute circles -->
        <circle cx="46" cy="68" r="10" fill="white"/>
        <circle cx="74" cy="68" r="10" fill="white"/>
        <circle cx="48" cy="67" r="6" fill="#2C1810"/>
        <circle cx="76" cy="67" r="6" fill="#2C1810"/>

        <circle cx="50" cy="65" r="2" fill="white"/>
        <circle cx="78" cy="65" r="2" fill="white"/>
        <!-- Nose -->
        <ellipse cx="60" cy="79" rx="4" ry="3" fill="#FF9999"/>
        <!-- Smile -->
        <path d="M 52 85 Q 60 92 68 85" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="20" y1="76" x2="50" y2="80" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="83" x2="50" y2="83" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="70" y1="80" x2="100" y2="76" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="70" y1="83" x2="100" y2="83" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
      </g>

      <!-- Face: nervous state (30s warning) -->
      <g id="faceNervous" style="display:none">
        <circle cx="46" cy="68" r="10" fill="white"/>
        <circle cx="74" cy="68" r="10" fill="white"/>
        <!-- Wide eyes -->
        <circle cx="48" cy="68" r="8" fill="#2C1810"/>
        <circle cx="76" cy="68" r="8" fill="#2C1810"/>
        <circle cx="50" cy="65" r="2.5" fill="white"/>
        <circle cx="78" cy="65" r="2.5" fill="white"/>
        <!-- Sweat drop -->
        <ellipse cx="88" cy="58" rx="3" ry="5" fill="#87CEEB" opacity="0.9"/>
        <!-- Worried mouth -->
        <path d="M 52 87 Q 60 83 68 87" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Whiskers (shaking slightly) -->
        <line x1="20" y1="76" x2="50" y2="80" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="84" x2="50" y2="83" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="70" y1="80" x2="100" y2="76" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="70" y1="83" x2="100" y2="84" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Nose -->
        <ellipse cx="60" cy="79" rx="4" ry="3" fill="#FF9999"/>
      </g>

      <!-- Face: dead X eyes -->
      <g id="faceDead" style="display:none">
        <circle cx="46" cy="68" r="10" fill="white"/>
        <circle cx="74" cy="68" r="10" fill="white"/>
        <!-- X eyes -->
        <line x1="39" y1="61" x2="53" y2="75" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
        <line x1="53" y1="61" x2="39" y2="75" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
        <line x1="67" y1="61" x2="81" y2="75" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
        <line x1="81" y1="61" x2="67" y2="75" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
        <!-- Tongue out -->
        <path d="M 53 85 Q 60 95 67 85" stroke="#8B4513" stroke-width="1.5" fill="#FF9999"/>
        <ellipse cx="60" cy="91" rx="6" ry="5" fill="#FF9999"/>
        <!-- Stars -->
        <text x="18" y="58" font-size="14" fill="#FFD700">★</text>
        <text x="88" y="52" font-size="10" fill="#FFD700">✦</text>
        <text x="10" y="72" font-size="8" fill="#FFD700">✦</text>
        <!-- Nose -->
        <ellipse cx="60" cy="79" rx="4" ry="3" fill="#FF9999"/>
        <!-- Whiskers droopy -->
        <line x1="20" y1="82" x2="50" y2="80" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="89" x2="50" y2="84" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="70" y1="80" x2="100" y2="82" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="70" y1="84" x2="100" y2="89" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
      </g>

      <!-- Tail -->
      <path d="M 82 130 Q 110 110 105 90" stroke="#F4A460" stroke-width="8" fill="none" stroke-linecap="round"/>

      <!-- Paws -->
      <ellipse cx="42" cy="136" rx="10" ry="6" fill="#F4A460"/>
      <ellipse cx="78" cy="136" rx="10" ry="6" fill="#F4A460"/>

    </svg>
  </div>

  <!-- The gun — positioned absolutely over kitten -->
  <div id="gunWrap">
    <svg id="gunSvg" viewBox="0 0 140 70" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">

      <!-- Gun body / frame -->
      <rect x="30" y="18" width="80" height="28" rx="6" fill="#444"/>
      <!-- Slide top -->
      <rect x="40" y="14" width="65" height="16" rx="4" fill="#555"/>
      <!-- Barrel -->
      <rect x="8" y="22" width="38" height="12" rx="4" fill="#333"/>
      <!-- Barrel tip -->
      <rect x="5" y="21" width="8" height="14" rx="2" fill="#222"/>

      <!-- Trigger guard -->
      <path d="M 72 46 Q 80 62 92 46" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Trigger -->
      <rect x="79" y="38" width="5" height="14" rx="2" fill="#222" transform="rotate(-10 82 45)"/>

      <!-- Handle -->
      <rect x="80" y="42" width="28" height="26" rx="5" fill="#5C3A1E"/>
      <!-- Handle grip lines -->
      <line x1="84" y1="47" x2="84" y2="65" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
      <line x1="89" y1="47" x2="89" y2="65" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
      <line x1="94" y1="47" x2="94" y2="65" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>

      <!-- Sight -->
      <rect x="95" y="11" width="6" height="6" rx="1" fill="#333"/>

      <!-- Muzzle flash (hidden until fired) -->
      <g id="muzzleFlash" style="display:none">
        <polygon points="5,28 -12,22 -8,28 -14,28 -8,34 -12,34" fill="#FFD700"/>
        <polygon points="5,28 -16,26 -10,28 -18,30 -10,30" fill="#FF8C00"/>
      </g>

      <!-- Smoke puffs (hidden until fired) -->
      <g id="smokePuffs" style="display:none">
        <circle cx="0" cy="25" r="5" fill="rgba(200,200,200,0.6)">
          <animate attributeName="cy" from="25" to="-5" dur="1s" repeatCount="indefinite"/>
          <animate attributeName="opacity" from="0.6" to="0" dur="1s" repeatCount="indefinite"/>
          <animate attributeName="r" from="4" to="10" dur="1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="3" cy="28" r="3" fill="rgba(200,200,200,0.5)">
          <animate attributeName="cy" from="28" to="-2" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
          <animate attributeName="opacity" from="0.5" to="0" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
        </circle>
      </g>

    </svg>
  </div>

</div>


<script>
  // Generate QR code for join page
  new QRCode(document.getElementById('displayQr'), {
    text: 'https://speaker-queue.homeplay.tv/join',
    width: 200,
    height: 200,
    colorDark: '#02050B',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });

  const client = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  let state = { topic: '', current_speaker_name: null, current_speaker_subject: null, speaker_started_at: null };
  let queueItems = [];
  let timerInterval = null;
  let kittenState = 'hidden'; // hidden | nervous | fired
  let hasFired = false;

  // ---- Data ----
  async function loadState() {
    const { data } = await client.from('meeting_state').select('*').eq('id', 1).single();
    if (data) { state = data; renderState(); }
  }

  async function loadQueue() {
    const { data } = await client.from('queue').select('*').order('joined_at', { ascending: true });
    queueItems = data || [];
    renderQueue();
  }

  // ---- Render state ----
  function renderState() {
    // Sync timer setting from database
    if (state.speaker_time_seconds) {
      CONFIG.SPEAKER_TIME_SECONDS = state.speaker_time_seconds;
    }

    // Queue open/closed
    const queueOpen = state.queue_open !== false;
    document.getElementById('qrJoin').style.display = queueOpen ? 'flex' : 'none';
    document.getElementById('queueClosedBanner').classList.toggle('visible', !queueOpen);

    const topicEl = document.getElementById('topicText');
    if (state.topic && state.topic.trim()) {
      topicEl.textContent = state.topic;
      topicEl.classList.remove('no-topic');
    } else {
      topicEl.textContent = 'No topic set';
      topicEl.classList.add('no-topic');
    }

    const card         = document.getElementById('speakerCard');
    const waitingMsg   = document.getElementById('waitingMsg');
    const speakerName  = document.getElementById('speakerName');
    const speakerSubj  = document.getElementById('speakerSubject');
    const timerBlock   = document.getElementById('timerBlock');
    const speakLabel   = document.getElementById('speakingLabel');

    if (state.current_speaker_name) {
      card.classList.remove('empty');
      waitingMsg.style.display  = 'none';
      speakerName.style.display = 'block';
      speakerSubj.style.display = 'block';
      timerBlock.style.display  = 'flex';
      speakLabel.textContent    = 'NOW SPEAKING';
      speakerName.textContent   = state.current_speaker_name;
      speakerSubj.textContent   = state.current_speaker_subject || '';
      hasFired = false;
      kittenState = 'hidden';
      resetKitten();
      startTimer();
    } else {
      card.classList.add('empty');
      waitingMsg.style.display  = 'block';
      speakerName.style.display = 'none';
      speakerSubj.style.display = 'none';
      timerBlock.style.display  = 'none';
      stopTimer();
      hideKitten();
    }
  }

  // ---- Render queue ----
  function renderQueue() {
    const list  = document.getElementById('queueList');
    const count = document.getElementById('queueCount');

    if (!queueItems.length) {
      list.innerHTML = '<div class="empty-queue">No speakers in queue</div>';
      count.textContent = '';
      return;
    }

    count.textContent = queueItems.length + ' waiting';
    list.innerHTML = queueItems.map((item, i) => `
      <div class="queue-item">
        <div class="queue-number">${String(i + 1).padStart(2, '0')}</div>
        <div class="queue-item-info">
          <div class="queue-item-name">${esc(item.name)}</div>
          <div class="queue-item-subject">${esc(item.subject)}</div>
        </div>
      </div>
    `).join('');
  }

  // ---- Timer ----
  function startTimer() {
    stopTimer();
    timerInterval = setInterval(updateTimer, 200);
    updateTimer();
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('timerDisplay').textContent = formatTime(CONFIG.SPEAKER_TIME_SECONDS);
    document.getElementById('timerDisplay').className = 'timer-display normal';
    document.getElementById('timerLabel').textContent = 'REMAINING';
    document.getElementById('timerLabel').className = 'timer-label normal';
  }

  function updateTimer() {
    if (!state.speaker_started_at) return;
    const elapsed   = Math.floor((Date.now() - new Date(state.speaker_started_at).getTime()) / 1000);
    const limit     = CONFIG.SPEAKER_TIME_SECONDS;
    const remaining = limit - elapsed;

    const display = document.getElementById('timerDisplay');
    const label   = document.getElementById('timerLabel');

    if (remaining > 0) {
      display.textContent = formatTime(remaining);

      if (remaining <= 30) {
        display.className = 'timer-display warning';
        label.className   = 'timer-label warning';
        label.textContent = 'REMAINING';
        updateKitten(remaining);
      } else {
        display.className = 'timer-display normal';
        label.className   = 'timer-label normal';
        label.textContent = 'REMAINING';
        hideKitten();
      }

    } else {
      const over = -remaining;
      display.textContent = '+' + formatTime(over);
      display.className   = 'timer-display overtime';
      label.className     = 'timer-label overtime';
      label.textContent   = 'OVER TIME';
      updateKittenOvertime();
    }
  }

  // ---- Kitten animation logic ----

  // ---- Stuart detection ----
  function isStuart() {
    const name = (state.current_speaker_name || '').trim().toLowerCase();
    return name === 'stuart' || name === 'stuart tickle';
  }

  function updateKitten(remaining) {
    // remaining: 30 down to 1
    const scene = document.getElementById('kittenScene');
    const gun   = document.getElementById('gunWrap');

    // Show scene
    scene.classList.add('visible');

    // Switch to nervous face
    showKittenFace('nervous');

    // Stuart: show label as soon as the kitten appears
    const stuartEl = document.getElementById('stuartLabel');
    if (isStuart()) {
      if (!stuartEl.classList.contains('visible')) {
        stuartEl.classList.add('visible');
      }
    } else {
      stuartEl.classList.remove('visible');
    }

    // Gun sits at a fixed position pointing at the cat and hovers gently
    gun.style.transform  = 'translateX(0px)';
    gun.style.transition = 'none';
    gun.style.animation  = 'gun-hover 1.8s ease-in-out infinite';

    hasFired = false;
  }

  function updateKittenOvertime() {
    const scene = document.getElementById('kittenScene');
    scene.classList.add('visible');

    // Gun stays fixed, stop hover animation when fired
    const gun = document.getElementById('gunWrap');
    gun.style.transform  = 'translateX(0px)';
    gun.style.transition = 'none';
    gun.style.animation  = 'none';

    if (!hasFired) {
      fireGun();
    }

    // Dead face + overtime BANG
    showKittenFace('dead');
    document.getElementById('muzzleFlash').style.display = 'none';
    document.getElementById('smokePuffs').style.display  = 'block';

    const bang = document.getElementById('bangEl');
    bang.classList.remove('bang');
    bang.className = 'overtime';
    bang.textContent = '💀 WRAP IT UP! 💀';

    // Stuart easter egg
    const stuartEl = document.getElementById('stuartLabel');
    if (isStuart()) {
      stuartEl.classList.remove('visible');
      void stuartEl.offsetWidth;
      stuartEl.classList.add('visible');
    } else {
      stuartEl.classList.remove('visible');
    }
  }

  function fireGun() {
    hasFired = true;

    // Show muzzle flash
    document.getElementById('muzzleFlash').style.display = 'block';

    // Shake scene
    const scene = document.getElementById('kittenScene');
    scene.classList.remove('fired');
    void scene.offsetWidth;
    scene.classList.add('fired');

    // BANG!
    const bang = document.getElementById('bangEl');
    bang.className = '';
    bang.textContent = 'BANG!';
    void bang.offsetWidth;
    bang.classList.add('bang');

    // Switch to dead face after tiny delay
    setTimeout(() => showKittenFace('dead'), 80);

    // Hide muzzle flash, show smoke
    setTimeout(() => {
      document.getElementById('muzzleFlash').style.display = 'none';
      document.getElementById('smokePuffs').style.display  = 'block';
    }, 300);
  }

  function showKittenFace(face) {
    document.getElementById('faceNormal').style.display  = face === 'normal'  ? 'block' : 'none';
    document.getElementById('faceNervous').style.display = face === 'nervous' ? 'block' : 'none';
    document.getElementById('faceDead').style.display    = face === 'dead'    ? 'block' : 'none';
  }

  function hideKitten() {
    const scene = document.getElementById('kittenScene');
    scene.classList.remove('visible');
  }

  function resetKitten() {
    hideKitten();
    document.getElementById('stuartLabel').classList.remove('visible');
    showKittenFace('normal');
    document.getElementById('gunWrap').style.transform  = 'translateX(350px)';
    document.getElementById('gunWrap').style.transition = 'none';
    document.getElementById('gunWrap').style.animation  = 'none';
    document.getElementById('muzzleFlash').style.display = 'none';
    document.getElementById('smokePuffs').style.display  = 'none';
    const bang = document.getElementById('bangEl');
    bang.className   = '';
    bang.textContent = 'BANG!';
  }

  // ---- Utils ----
  function formatTime(s) {
    const m = Math.floor(s / 60);
    return `${m}:${(s % 60).toString().padStart(2, '0')}`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ---- Realtime ----
  function subscribeRealtime() {
    client.channel('display-channel')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'meeting_state' }, () => loadState())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, () => loadQueue())
      .subscribe(status => {
        const ind = document.getElementById('liveIndicator');
        const txt = document.getElementById('liveIndicatorText');
        const connected = status === 'SUBSCRIBED';
        ind.classList.toggle('disconnected', !connected);
        txt.textContent = connected ? 'Live Connection' : 'Reconnecting...';
      });
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { loadState(); loadQueue(); }
  });

  loadState();
  loadQueue();
  subscribeRealtime();
</script>
</body>
</html>
