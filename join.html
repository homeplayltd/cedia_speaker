<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Speaker Queue — Request to Speak</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #02050B;
      --accent: #C15027;
      --text: #FFFFFF;
      --text-dim: rgba(255,255,255,0.5);
      --text-faint: rgba(255,255,255,0.18);
      --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.09);
      --input-bg: rgba(255,255,255,0.07);
      --input-border: rgba(255,255,255,0.12);
      --success: #22c55e;
      --danger: #ef4444;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 100% 40% at 50% 0%, rgba(193,80,39,0.14) 0%, transparent 60%);
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .header {
      padding: 28px 24px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--card-border);
    }

    .logo img { height: 28px; opacity: 0.9; }

      50% { opacity: 0.3; }
    }

    .topic-section { padding: 18px 24px 0; }

    .topic-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .topic-pill {
      background: rgba(193,80,39,0.1);
      border: 1px solid rgba(193,80,39,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      min-height: 44px;
      transition: all 0.3s;
    }

    .topic-pill.no-topic {
      background: var(--card);
      border-color: var(--card-border);
      color: var(--text-dim);
      font-weight: 400;
      font-style: italic;
    }

    /* Form */
    .form-section {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
    }

    .form-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    .field label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .field input, .field textarea {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    .field input::placeholder, .field textarea::placeholder { color: var(--text-faint); }

    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.09);
    }

    .field textarea { resize: none; height: 90px; line-height: 1.5; }

    .char-count {
      font-size: 0.75rem;
      color: var(--text-faint);
      text-align: right;
      margin-top: -4px;
    }

    .btn-join {
      width: 100%;
      padding: 17px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-join:hover { background: #D4613A; }
    .btn-join:active { transform: scale(0.98); }
    .btn-join:disabled { background: rgba(193,80,39,0.35); cursor: not-allowed; }

    /* Confirmation */
    .confirmation {
      display: none;
      padding: 36px 24px 28px;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
      flex: 1;
    }

    .confirmation.active { display: flex; }

    .conf-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(34,197,94,0.15);
      border: 2px solid rgba(34,197,94,0.4);
      display: flex; align-items: center; justify-content: center;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transition: background 0.4s, border-color 0.4s;
      font-size: 2rem;
    }

    .conf-icon.speaking {
      background: rgba(34,197,94,0.2);
      border-color: rgba(34,197,94,0.6);
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .conf-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 700;
    }

    .position-badge {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 22px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
      transition: background 0.4s, border-color 0.4s;
    }

    .position-badge.speaking {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.3);
    }

    @keyframes flash-up {
      0% { background: rgba(193,80,39,0.2); }
      100% { background: var(--card); }
    }

    .position-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      transition: color 0.4s, font-size 0.3s;
    }

    .position-number.next {
      color: var(--success);
    }

    .position-number.speaking {
      color: var(--success);
      font-size: 1.6rem;
      line-height: 1.4;
    }

    .position-label {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .conf-detail {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .conf-detail strong { color: var(--text); }

    .conf-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-top: auto;
    }

    .btn-another {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      color: var(--text-dim);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-another:hover { border-color: var(--accent); color: var(--text); }

    .btn-remove-me {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 14px;
      color: rgba(239,68,68,0.6);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-remove-me:hover {
      background: rgba(239,68,68,0.07);
      border-color: rgba(239,68,68,0.5);
      color: var(--danger);
    }

    /* Removed view */
    .removed-view {
      display: none;
      padding: 48px 24px;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      flex: 1;
    }

    .removed-view.active { display: flex; }

    .removed-icon {
      font-size: 3rem;
      margin-bottom: 4px;
    }

    .removed-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text-dim);
    }

    .removed-sub {
      font-size: 0.88rem;
      color: var(--text-faint);
      line-height: 1.6;
      max-width: 280px;
    }

    .btn-rejoin {
      margin-top: 12px;
      width: 100%;
      padding: 17px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-rejoin:hover { background: #D4613A; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--danger);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      max-width: 320px;
      text-align: center;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Home button */
    .home-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.55);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .home-btn:hover {
      background: rgba(193,80,39,0.15);
      border-color: rgba(193,80,39,0.35);
      color: #FFFFFF;
    }
    .home-btn svg {
      width: 13px; height: 13px;
      flex-shrink: 0;
    }

    /* Live connection indicator */
    .live-indicator {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(2,5,11,0.7);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 20px;
      backdrop-filter: blur(6px);
      pointer-events: none;
      transition: border-color 0.4s, background 0.4s;
    }

    .live-indicator.disconnected {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.4);
    }

    .live-indicator-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
      animation: live-pulse 1.5s ease-in-out infinite;
      transition: background 0.4s;
    }

    .live-indicator.disconnected .live-indicator-dot {
      background: var(--danger);
      animation: none;
    }

    @keyframes live-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.8); transform: scale(1); }
      50%  { box-shadow: 0 0 0 7px rgba(34,197,94,0); transform: scale(1.2); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); transform: scale(1); }
    }

    .live-indicator-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--success);
      transition: color 0.4s;
    }

    .live-indicator.disconnected .live-indicator-text {
      color: var(--danger);
    }
  </style>
</head>
<body>

<div class="live-indicator" id="liveIndicator">
  <div class="live-indicator-dot"></div>
  <span class="live-indicator-text" id="liveIndicatorText">Live Connection</span>
</div>
<a class="home-btn" href="/">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
    <path d="M9 21V12h6v9"/>
  </svg>
  Home
</a>


<div class="page">

  <div class="header">
    <div class="logo">
      <img src="https://cedia.org/site/assets/files/1033/cedia_logo_tagline_white_email-1.png" alt="CEDIA">
    </div>
      
  </div>

  <div class="topic-section">
    <div class="topic-label">Current Topic</div>
    <div class="topic-pill no-topic" id="topicPill">Waiting for moderator...</div>
  </div>

  <!-- Join form -->
  <div class="form-section" id="formSection">
    <div class="form-title">Request to Speak</div>

    <div class="field">
      <label for="nameInput">Your Name</label>
      <input type="text" id="nameInput" placeholder="e.g. James Ratcliffe" autocomplete="name" maxlength="60">
    </div>

    <div class="field">
      <label for="subjectInput">What would you like to say?</label>
      <textarea id="subjectInput" placeholder="Brief subject or point you'd like to raise..." maxlength="120"></textarea>
      <div class="char-count"><span id="charCount">0</span>/120</div>
    </div>

    <button class="btn-join" id="joinBtn" onclick="joinQueue()">Join Queue</button>
  </div>

  <!-- In-queue confirmation with live position -->
  <div class="confirmation" id="confirmation">

    <div class="conf-icon" id="confIcon">✅</div>

    <div class="conf-title" id="confTitle">You're in the queue</div>

    <div class="position-badge" id="positionBadge">
      <div class="position-number" id="positionNumber">—</div>
      <div class="position-label" id="positionLabel">in the queue</div>
    </div>

    <div class="conf-detail" id="confDetail"></div>

    <div class="conf-buttons">
      <button class="btn-another" onclick="resetAndRejoin()">Join Again for New Topic</button>
      <button class="btn-remove-me" id="btnRemoveMe" onclick="removeMe()">Remove Me From Queue</button>
    </div>

  </div>

  <!-- Removed / withdrawn view -->
  <div class="removed-view" id="removedView">
    <div class="removed-icon" id="removedIcon">👋</div>
    <div class="removed-title" id="removedTitle">You've left the queue</div>
    <div class="removed-sub" id="removedSub">You're no longer in the speaker queue.</div>
    <button class="btn-rejoin" onclick="resetAndRejoin()">Rejoin Queue</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const client = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  let myRowId   = null;
  let myName    = '';
  let mySubject = '';
  let isInQueue = false;
  let lastPos   = null;

  // ---- Topic ----
  async function loadTopic() {
    const { data } = await client.from('meeting_state').select('topic').eq('id', 1).single();
    if (data) renderTopic(data.topic);
  }

  function renderTopic(topic) {
    const pill = document.getElementById('topicPill');
    if (topic && topic.trim()) {
      pill.textContent = topic;
      pill.classList.remove('no-topic');
    } else {
      pill.textContent = 'Waiting for moderator...';
      pill.classList.add('no-topic');
    }
  }

  // ---- Join queue ----
  async function joinQueue() {
    const name    = document.getElementById('nameInput').value.trim();
    const subject = document.getElementById('subjectInput').value.trim();

    if (!name)    { showToast('Please enter your name'); return; }
    if (!subject) { showToast('Please add a brief subject'); return; }

    const btn = document.getElementById('joinBtn');
    btn.disabled = true;
    btn.textContent = 'Joining...';

    const { data, error } = await client
      .from('queue')
      .insert({ name, subject })
      .select()
      .single();

    if (error || !data) {
      showToast('Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Join Queue';
      return;
    }

    myRowId   = data.id;
    myName    = name;
    mySubject = subject;
    isInQueue = true;
    lastPos   = null;

    document.getElementById('confDetail').innerHTML =
      `<strong>${esc(name)}</strong> &mdash; ${esc(subject)}`;

    showView('confirmation');
    refreshPosition();
  }

  // ---- Live position refresh ----
  async function refreshPosition() {
    if (!myRowId) return;

    const { data: queue } = await client
      .from('queue')
      .select('id')
      .order('joined_at', { ascending: true });

    if (!queue) return;

    const idx = queue.findIndex(r => r.id === myRowId);

    if (idx === -1) {
      // I'm not in the queue anymore
      const { data: state } = await client
        .from('meeting_state')
        .select('current_speaker_name')
        .eq('id', 1)
        .single();

      if (state && state.current_speaker_name === myName) {
        setSpeakingNow();
      } else if (isInQueue) {
        // Moderator removed me or topic was reset
        isInQueue = false;
        showRemovedView(false);
      }
      return;
    }

    isInQueue = true;
    const pos = idx + 1;

    // Flash if position improved
    if (lastPos !== null && pos < lastPos) {
      const badge = document.getElementById('positionBadge');
      badge.style.animation = 'none';
      void badge.offsetWidth;
      badge.style.animation = 'flash-up 0.5s ease-out';
    }
    lastPos = pos;

    const numEl   = document.getElementById('positionNumber');
    const labelEl = document.getElementById('positionLabel');
    const title   = document.getElementById('confTitle');
    const icon    = document.getElementById('confIcon');
    const badge   = document.getElementById('positionBadge');

    // Reset speaking styles
    badge.classList.remove('speaking');
    icon.classList.remove('speaking');
    numEl.className = pos === 1 ? 'position-number next' : 'position-number';

    title.textContent  = "You're in the queue";
    icon.textContent   = '✅';
    numEl.textContent  = pos;
    labelEl.textContent = pos === 1 ? "You're next!" : 'in the queue';

    document.getElementById('btnRemoveMe').style.display = 'block';
  }

  // ---- Speaking now ----
  function setSpeakingNow() {
    const numEl   = document.getElementById('positionNumber');
    const labelEl = document.getElementById('positionLabel');
    const badge   = document.getElementById('positionBadge');
    const icon    = document.getElementById('confIcon');
    const title   = document.getElementById('confTitle');

    badge.classList.add('speaking');
    icon.classList.add('speaking');
    numEl.className    = 'position-number speaking';
    title.textContent  = "It's your turn!";
    icon.textContent   = '🎙';
    numEl.textContent  = "You're speaking now";
    labelEl.textContent = '';
    document.getElementById('btnRemoveMe').style.display = 'none';
  }

  // ---- Remove myself ----
  async function removeMe() {
    if (!myRowId) return;
    const { error } = await client.from('queue').delete().eq('id', myRowId);
    if (error) { showToast('Something went wrong. Try again.'); return; }
    isInQueue = false;
    myRowId   = null;
    showRemovedView(true);
  }

  // ---- Show removed view ----
  function showRemovedView(selfRemoved) {
    showView('removed');
    document.getElementById('removedIcon').textContent  = selfRemoved ? '👋' : '🔔';
    document.getElementById('removedTitle').textContent = selfRemoved
      ? "You've left the queue"
      : "You've been removed";
    document.getElementById('removedSub').textContent   = selfRemoved
      ? "You removed yourself from the speaker queue."
      : "The moderator has moved on or removed you from the queue.";
  }

  // ---- Reset / rejoin ----
  function resetAndRejoin() {
    myRowId   = null;
    isInQueue = false;
    lastPos   = null;
    document.getElementById('subjectInput').value    = '';
    document.getElementById('charCount').textContent = '0';
    document.getElementById('joinBtn').disabled      = false;
    document.getElementById('joinBtn').textContent   = 'Join Queue';
    document.getElementById('positionNumber').textContent = '—';
    document.getElementById('positionNumber').className   = 'position-number';
    document.getElementById('positionBadge').classList.remove('speaking');
    showView('form');
  }

  // ---- View switcher ----
  function showView(view) {
    document.getElementById('formSection').style.display   = view === 'form'         ? 'flex'  : 'none';
    document.getElementById('confirmation').classList.toggle('active', view === 'confirmation');
    document.getElementById('removedView').classList.toggle('active',  view === 'removed');
  }

  // ---- Char count ----
  document.getElementById('subjectInput').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length;
  });

  // ---- Toast ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ---- Realtime ----
  client.channel('join-channel')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'meeting_state' }, payload => {
      renderTopic(payload.new.topic);
      if (isInQueue || myRowId) refreshPosition();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, () => {
      if (isInQueue || myRowId) refreshPosition();
    })
    .subscribe(status => {
      const ind = document.getElementById('liveIndicator');
      const txt = document.getElementById('liveIndicatorText');
      const connected = status === 'SUBSCRIBED';
      ind.classList.toggle('disconnected', !connected);
      txt.textContent = connected ? 'Live Connection' : 'Reconnecting...';
    });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      loadTopic();
      if (isInQueue || myRowId) refreshPosition();
    }
  });

  loadTopic();
</script>
</body>
</html>
