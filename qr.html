<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speaker Queue — QR Code</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #02050B;
      --accent: #C15027;
      --text: #FFFFFF;
      --text-dim: rgba(255,255,255,0.5);
      --card-border: rgba(255,255,255,0.1);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(193,80,39,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 52px;
      max-width: 520px;
      width: calc(100% - 40px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      text-align: center;
    }

    .card-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo img { height: 42px; opacity: 0.9; }

    .card-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* QR code container */
    .qr-wrapper {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
    }

    #qrcode canvas, #qrcode img {
      display: block;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .card-subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .url-display {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 0.82rem;
      color: var(--text-dim);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.04em;
      word-break: break-all;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
      width: 100%;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .step-num {
      background: var(--accent);
      color: white;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.5;
    }


    @media print {
      body::before { display: none; }
      .card {
        background: white;
        border: 2px solid #ddd;
        color: black;
      }
      .card-heading, .card-title { color: #C15027 !important; }
      .card-subtitle, .step-text, .url-display { color: #555 !important; }
      .qr-wrapper { border: 1px solid #ddd; }
      .logo img { filter: invert(1); }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <a href="/" style="text-decoration:none;"><div class="logo">
      <img src="https://cedia.org/site/assets/files/1033/cedia_logo_tagline_white_email-1.png" alt="CEDIA">
    </div></a>
    
    <div class="card-heading">Board Meeting</div>
  </div>

  <div class="qr-wrapper">
    <div id="qrcode"></div>
  </div>

  <div class="card-body">
    <div class="card-title">Scan to Request<br>to Speak</div>
    <div class="card-subtitle">Use your phone to join the speaker queue and let the moderator know you'd like to contribute.</div>
    <div class="url-display" id="urlDisplay">Generating...</div>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Scan the QR code with your phone camera</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Enter your name and a brief subject line</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Tap "Join Queue" — you'll see your position</div>
    </div>
  </div>

  <a href="/" style="display:inline-block; padding:14px 36px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:12px; color:rgba(255,255,255,0.7); font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; text-decoration:none; margin-top:8px; transition:all 0.2s;">&#8962; Home</a>
</div>

<script>
  // Derive join URL from current page origin
  const joinUrl = 'https://speaker-queue.homeplay.tv/join';
  document.getElementById('urlDisplay').textContent = joinUrl;
  document.getElementById('urlDisplay').style.fontFamily = "'DM Sans', sans-serif";

  new QRCode(document.getElementById('qrcode'), {
    text: joinUrl,
    width: 220,
    height: 220,
    colorDark: '#02050B',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
